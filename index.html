<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>White Bear Clicker</title>

<script src="https://yandex.ru/games/sdk/v2"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1d2a;
  color:white;
  text-align:center;
}

.topbar {
  position:fixed;
  top:0;
  width:100%;
  background:#102a3a;
  padding:10px;
  z-index:10;
}

.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:#102a3a;
  padding:10px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

.bear {
  font-size:80px;
  margin-top:100px;
}

.shop {
  margin-top:20px;
  padding-bottom:120px;
}

.toast {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="topbar">
  <div id="fish">🐟 0</div>
</div>

<div class="bear" onclick="clickBear()">🐻‍❄️</div>

<button id="startBtn" onclick="startBonus()">🎁 Стартовый бонус</button>

<div id="shop" class="shop"></div>

<div class="bottom">
  <button onclick="rewardBoost()">📺 x2</button>
  <button onclick="save()">💾</button>
  <button onclick="toggleSound()">🔊</button>
  <button onclick="toggleVibration()">📳</button>
</div>

<div id="toast" class="toast"></div>

<script>
let fish=0;
let income=0;
let sound=true;
let vibration=true;
let boost=false;

let upgrades=[
{name:"Лунка",cost:10,income:1},
{name:"Удочка",cost:50,income:5},
{name:"Лагерь",cost:200,income:10},
{name:"Завод",cost:1000,income:50},
{name:"Дрон",cost:5000,income:200},
{name:"Экспедиция",cost:20000,income:500},
{name:"Спутник",cost:250000,income:2000},
{name:"Океан ферма",cost:500000,income:5000}
];

let achievements=[
{goal:100,done:false},
{goal:1000,done:false},
{goal:10000,done:false},
{goal:100000,done:false}
];

function format(n){
 if(n>=1000000)return (n/1000000).toFixed(1)+"M";
 if(n>=1000)return (n/1000).toFixed(1)+"K";
 return n;
}

function update(){
 document.getElementById("fish").innerText="🐟 "+format(fish);
 renderShop();
}

function clickBear(){
 fish+=boost?2:1;
 if(vibration)navigator.vibrate?.(10);
 if(sound)new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play();
 checkAchievements();
 update();
}

function renderShop(){
 let el=document.getElementById("shop");
 el.innerHTML="";
 upgrades.sort((a,b)=>a.cost-b.cost);
 upgrades.forEach(u=>{
  let b=document.createElement("button");
  b.innerText=u.name+" ("+format(u.cost)+")";
  b.onclick=()=>{
    if(fish>=u.cost){
      fish-=u.cost;
      income+=u.income;
      update();
    }
  };
  el.appendChild(b);
 });
}

function checkAchievements(){
 achievements.forEach(a=>{
  if(!a.done && fish>=a.goal){
    a.done=true;
    fish+=100;
    toast("🏆 "+a.goal);
  }
 });
}

function toast(t){
 let el=document.getElementById("toast");
 el.innerText=t;
 el.style.opacity=1;
 setTimeout(()=>el.style.opacity=0,2000);
}

function save(){
 localStorage.setItem("save",JSON.stringify({fish,income}));
 showAd();
}

function load(){
 let s=localStorage.getItem("save");
 if(s){
  let d=JSON.parse(s);
  fish=d.fish;
  income=d.income;
 }
}

function startBonus(){
 document.getElementById("startBtn").style.display="none";
 fish+=300;
 update();
}

function rewardBoost(){
 showRewardAd(()=>{
   boost=true;
   toast("x2 на 3 минуты");
   setTimeout(()=>boost=false,180000);
 });
}

function toggleSound(){
 sound=!sound;
 toast("Звук "+(sound?"ON":"OFF"));
}

function toggleVibration(){
 vibration=!vibration;
 toast("Вибрация "+(vibration?"ON":"OFF"));
}

/* РЕКЛАМА */
let ysdk;

function showRewardAd(callback){
 if(ysdk){
  ysdk.adv.showRewardedVideo({
    callbacks:{
      onRewarded:callback
    }
  });
 }else{
  callback();
 }
}

function showAd(){
 if(ysdk){
  ysdk.adv.showFullscreenAdv();
 }
}

/* ЦИКЛ */
setInterval(()=>{
 fish+=income;
 update();
},1000);

/* SDK */
YaGames.init().then(sdk=>{
 ysdk=sdk;
 ysdk.features.LoadingAPI.ready();
 ysdk.features.GameplayAPI.start();
});

/* старт */
load();
update();
</script>

</body>
  </html>
